# ============================================================
# YOUEMS Savings Tracker — Standalone Package
# ============================================================
# Tracks electricity savings from solar, battery discharge,
# and arbitrage vs what you would have paid from the grid.
#
# Formula per 15-minute slot:
#   savings = (house_delta - import_delta) × buy_price
#           + export_delta × sell_price
#
# Where:
#   house_delta  = energy consumed by house (kWh)
#   import_delta = energy imported from grid (kWh)
#   (house - import) = energy served by solar/battery (kWh)
#   export_delta = energy exported to grid (kWh)
#
# Deploy: copy to /config/integrations/youems_savings.yaml
# Requires: configuration.yaml includes packages folder, e.g.:
#   homeassistant:
#     packages: !include_dir_named integrations/
# ============================================================

input_number:

  youems_savings_total_kr:
    name: "YOUEMS Savings Total (Kr)"
    min: -99999
    max: 99999
    step: 0.01
    unit_of_measurement: "Kr"
    icon: mdi:piggy-bank

  youems_savings_today_kr:
    name: "YOUEMS Savings Today (Kr)"
    min: -99999
    max: 99999
    step: 0.01
    unit_of_measurement: "Kr"
    icon: mdi:calendar-today

  youems_savings_yesterday_kr:
    name: "YOUEMS Savings Yesterday (Kr)"
    min: -99999
    max: 99999
    step: 0.01
    unit_of_measurement: "Kr"
    icon: mdi:calendar-minus

  youems_savings_month_kr:
    name: "YOUEMS Savings This Month (Kr)"
    min: -99999
    max: 99999
    step: 0.01
    unit_of_measurement: "Kr"
    icon: mdi:calendar-month

  youems_savings_last_month_kr:
    name: "YOUEMS Savings Last Month (Kr)"
    min: -99999
    max: 99999
    step: 0.01
    unit_of_measurement: "Kr"
    icon: mdi:calendar-month-outline

  # Previous readings — seed these once with current meter values
  # (Developer Tools → States → set_value)
  youems_savings_export_prev:
    name: "YOUEMS Prev Export Reading (kWh)"
    min: 0
    max: 9999999
    step: 0.001
    unit_of_measurement: "kWh"
    icon: mdi:counter

  youems_savings_import_prev:
    name: "YOUEMS Prev Import Reading (kWh)"
    min: 0
    max: 9999999
    step: 0.001
    unit_of_measurement: "kWh"
    icon: mdi:counter

  youems_savings_house_prev:
    name: "YOUEMS Prev House Energy Reading (kWh)"
    min: 0
    max: 9999999
    step: 0.001
    unit_of_measurement: "kWh"
    icon: mdi:counter


template:
  - sensor:
      # Read-only display sensors — safe to show in dashboards,
      # recorder tracks full history for graphing.

      - name: "YOUEMS Savings Today"
        unique_id: youems_savings_today
        unit_of_measurement: "Kr"
        icon: mdi:calendar-today
        state: "{{ states('input_number.youems_savings_today_kr') | float(0) | round(2) }}"

      - name: "YOUEMS Savings Yesterday"
        unique_id: youems_savings_yesterday
        unit_of_measurement: "Kr"
        icon: mdi:calendar-minus
        state: "{{ states('input_number.youems_savings_yesterday_kr') | float(0) | round(2) }}"

      - name: "YOUEMS Savings This Month"
        unique_id: youems_savings_this_month
        unit_of_measurement: "Kr"
        icon: mdi:calendar-month
        state: "{{ states('input_number.youems_savings_month_kr') | float(0) | round(2) }}"

      - name: "YOUEMS Savings Last Month"
        unique_id: youems_savings_last_month
        unit_of_measurement: "Kr"
        icon: mdi:calendar-month-outline
        state: "{{ states('input_number.youems_savings_last_month_kr') | float(0) | round(2) }}"

      - name: "YOUEMS Savings Total"
        unique_id: youems_savings_total
        unit_of_measurement: "Kr"
        icon: mdi:piggy-bank
        state: "{{ states('input_number.youems_savings_total_kr') | float(0) | round(2) }}"


automation:
  - id: youems_savings_tracker
    alias: "YOUEMS - Savings Tracker (15-min)"
    description: >
      Runs at each 15-minute Nordpool slot boundary.
      Computes savings vs paying full grid price for all consumption.
      Looks up the just-ended slot's exact price from raw_today attribute.
    triggers:
      - trigger: time_pattern
        minutes: "0"
      - trigger: time_pattern
        minutes: "15"
      - trigger: time_pattern
        minutes: "30"
      - trigger: time_pattern
        minutes: "45"
    actions:
      - variables:
          # Slot that just ended — back off 5 min for robustness vs automation delay
          slot_start: >
            {{ ((now().timestamp() | int - 300) // 900 * 900) | int }}
          # Look up exact price for the slot that just ended from raw_today attribute
          sell_price: >
            {%- set raw = state_attr('sensor.nordpool_kwh_se3_sek_5_00_0', 'raw_today') | default([]) -%}
            {%- set found = namespace(price=states('sensor.nordpool_kwh_se3_sek_5_00_0') | float(0)) -%}
            {%- for s in raw -%}
              {%- set ts = (s.start | as_datetime | as_local).timestamp() | int -%}
              {%- if ts == slot_start -%}{%- set found.price = s.value | float(0) -%}{%- endif -%}
            {%- endfor -%}
            {{ found.price }}
          buy_price: >
            {%- set raw = state_attr('sensor.nordpool_kwh_se3_sek_4_10_0', 'raw_today') | default([]) -%}
            {%- set found = namespace(price=states('sensor.nordpool_kwh_se3_sek_4_10_0') | float(0)) -%}
            {%- for s in raw -%}
              {%- set ts = (s.start | as_datetime | as_local).timestamp() | int -%}
              {%- if ts == slot_start -%}{%- set found.price = s.value | float(0) -%}{%- endif -%}
            {%- endfor -%}
            {{ found.price }}
          export_now: "{{ states('sensor.solax_inverter_grid_export_total') | float(0) }}"
          import_now: "{{ states('sensor.solax_inverter_grid_import_total') | float(0) }}"
          house_now: "{{ states('sensor.solax_inverter_house_energy_total') | float(0) }}"
          export_prev: "{{ states('input_number.youems_savings_export_prev') | float(0) }}"
          import_prev: "{{ states('input_number.youems_savings_import_prev') | float(0) }}"
          house_prev: "{{ states('input_number.youems_savings_house_prev') | float(0) }}"
          export_delta: >
            {{ [export_now - export_prev, 0] | max
               if export_now >= export_prev else 0 }}
          import_delta: >
            {{ [import_now - import_prev, 0] | max
               if import_now >= import_prev else 0 }}
          house_delta: >
            {{ [house_now - house_prev, 0] | max
               if house_now >= house_prev else 0 }}
          slot_savings: >
            {{ ((house_delta - import_delta) * buy_price) + (export_delta * sell_price) }}
          is_midnight: "{{ now().hour == 0 and now().minute == 0 }}"
      # At midnight: roll today → yesterday, reset today
      - if:
          - condition: template
            value_template: "{{ is_midnight }}"
        then:
          - action: input_number.set_value
            target:
              entity_id: input_number.youems_savings_yesterday_kr
            data:
              value: "{{ states('input_number.youems_savings_today_kr') | float(0) | round(2) }}"
          - action: input_number.set_value
            target:
              entity_id: input_number.youems_savings_today_kr
            data:
              value: 0
          # On 1st of month: roll this month → last month, reset month
          - if:
              - condition: template
                value_template: "{{ now().day == 1 }}"
            then:
              - action: input_number.set_value
                target:
                  entity_id: input_number.youems_savings_last_month_kr
                data:
                  value: "{{ states('input_number.youems_savings_month_kr') | float(0) | round(2) }}"
              - action: input_number.set_value
                target:
                  entity_id: input_number.youems_savings_month_kr
                data:
                  value: 0
      # Accumulate savings
      - action: input_number.set_value
        target:
          entity_id: input_number.youems_savings_total_kr
        data:
          value: >
            {{ ((states('input_number.youems_savings_total_kr') | float(0))
                + slot_savings) | round(2) }}
      - action: input_number.set_value
        target:
          entity_id: input_number.youems_savings_today_kr
        data:
          value: >
            {{ ((states('input_number.youems_savings_today_kr') | float(0))
                + slot_savings) | round(2) }}
      - action: input_number.set_value
        target:
          entity_id: input_number.youems_savings_month_kr
        data:
          value: >
            {{ ((states('input_number.youems_savings_month_kr') | float(0))
                + slot_savings) | round(2) }}
      # Update previous readings for next slot
      - action: input_number.set_value
        target:
          entity_id: input_number.youems_savings_export_prev
        data:
          value: "{{ export_now | round(3) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.youems_savings_import_prev
        data:
          value: "{{ import_now | round(3) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.youems_savings_house_prev
        data:
          value: "{{ house_now | round(3) }}"
    mode: single
